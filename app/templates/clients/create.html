{% extends "base.html" %}

{% block title %}Создать клиента{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h2 mb-1">Создать клиента</h1>
          <p class="text-secondary mb-0">Заполните данные нового клиента.</p>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('pages.clients_list') }}">К списку</a>
      </div>

      {% if errors %}
        <div class="alert alert-danger" role="alert">
          <ul class="mb-0">
            {% for error in errors %}
              <li>{{ error }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}

      <form class="card" method="post" action="{{ url_for('pages.clients_create') }}">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label" for="name">Имя</label>
            <input class="form-control" id="name" name="name" type="text" value="{{ form_data.name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" value="{{ form_data.email }}" required>
          </div>

          <div class="mb-4">
            <label class="form-label" for="phone">Телефон</label>
            <input class="form-control" id="phone" name="phone" type="text" value="{{ form_data.phone }}">
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Создать</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('pages.clients_list') }}">Отмена</a>
          </div>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
