<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>testFS API</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Flask REST API</p>
          <h1>testFS Orders</h1>
        </div>
        <button id="load-health" type="button">Check health</button>
      </header>

      <section class="status-bar" aria-live="polite">
        <strong>Status</strong>
        <pre id="status-output">Ready</pre>
      </section>

      <section class="grid">
        <form id="client-form" class="panel">
          <h2>Create client</h2>
          <label>
            Name
            <input name="name" type="text" placeholder="Test Client" required>
          </label>
          <label>
            Email
            <input name="email" type="email" placeholder="test@example.com" required>
          </label>
          <label>
            Phone
            <input name="phone" type="text" placeholder="+380000000000">
          </label>
          <button type="submit">Create client</button>
        </form>

        <form id="product-form" class="panel">
          <h2>Create product</h2>
          <label>
            Name
            <input name="name" type="text" placeholder="Test Product" required>
          </label>
          <label>
            SKU
            <input name="sku" type="text" placeholder="TEST-001" required>
          </label>
          <label>
            Price
            <input name="price" type="text" inputmode="decimal" placeholder="100.00" required>
          </label>
          <button type="submit">Create product</button>
        </form>

        <form id="order-form" class="panel">
          <h2>Create order</h2>
          <label>
            Client ID
            <input name="client_id" type="number" min="1" placeholder="1" required>
          </label>
          <label>
            Product ID
            <input name="product_id" type="number" min="1" placeholder="1" required>
          </label>
          <label>
            Quantity
            <input name="quantity" type="number" min="1" placeholder="2" required>
          </label>
          <button type="submit">Create order</button>
        </form>

        <form id="orders-form" class="panel">
          <h2>Client orders</h2>
          <label>
            Client ID
            <input name="client_id" type="number" min="1" placeholder="1" required>
          </label>
          <button type="submit">Load orders</button>
        </form>
      </section>

      <section class="orders-section">
        <div class="section-title">
          <h2>Orders</h2>
          <button id="clear-orders" type="button">Clear</button>
        </div>
        <div id="orders-list" class="orders-list">No orders loaded</div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
