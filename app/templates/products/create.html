{% extends "base.html" %}

{% block title %}Создать товар{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h2 mb-1">Создать товар</h1>
          <p class="text-secondary mb-0">Заполните данные нового товара.</p>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('pages.products_list') }}">К списку</a>
      </div>

      {% if errors %}
        <div class="alert alert-danger" role="alert">
          <ul class="mb-0">
            {% for error in errors %}
              <li>{{ error }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}

      <form class="card" method="post" action="{{ url_for('pages.products_create') }}">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label" for="name">Название</label>
            <input class="form-control" id="name" name="name" type="text" value="{{ form_data.name }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="sku">SKU</label>
            <input class="form-control" id="sku" name="sku" type="text" value="{{ form_data.sku }}" required>
          </div>

          <div class="mb-4">
            <label class="form-label" for="price">Цена</label>
            <input class="form-control" id="price" name="price" type="text" inputmode="decimal" value="{{ form_data.price }}" required>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Создать</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('pages.products_list') }}">Отмена</a>
          </div>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
